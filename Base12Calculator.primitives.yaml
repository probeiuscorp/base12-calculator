- BlackBox:
    name: OLED.oledDriver
    kind: Declaration
    type: |-
      oledDriver
        :: Clock dom
        -> Reset dom
        -> Signal dom Bit
        -> Signal dom Bit
        -> Signal dom (Unsigned 8)
        -> Signal dom (Unsigned 2)
        -> Signal dom (Unsigned 4)
        -> Signal dom (Unsigned 8)
    template: |-
      // oledDriver begin
      wire ~GENSYM[ready][1], ~GENSYM[cs_n][2], ~GENSYM[sdo][3], ~GENSYM[sclk][4];
      wire ~GENSYM[dc][5], ~GENSYM[vbat][6], ~GENSYM[vdd][7], ~GENSYM[res][8];
      oledDriver ~GENSYM[oled_driver][0] (
        .clk(~ARG[0]),
        .rst_n(~ARG[1]),
        .showchar(~ARG[2]),
        .showbmp(1'b0),
        .clear(~ARG[3]),
        .charval(~ARG[4]),
        .char_row(~ARG[5]),
        .char_col(~ARG[6]),
        .bmp(2'b0),
        .ready(~SYM[1]),
        // OLED header signals:
        .cs_n(~SYM[2]),
        .sdo(~SYM[3]),
        .sclk(~SYM[4]),
        .dc(~SYM[5]),
        .vbat(~SYM[6]),
        .vdd(~SYM[7]),
        .res(~SYM[8])
      );
      assign ~RESULT[7:0] = {~SYM[1], ~SYM[7], ~SYM[6], ~SYM[8], ~SYM[5], ~SYM[4], ~SYM[3], ~SYM[2]};
      // oledDriver end
